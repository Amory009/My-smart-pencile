name: Build Flutter Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الكود من مستودعك
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. تثبيت الجافا المتوافقة تماماً مع الأندرويد
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. تثبيت بيئة فلاتر المستقرة
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    # 4. بناء مشروع فلاتر مستقل ونظيف تماماً لتفادي أي تعارض في الـ Gradle
    - name: Create Clean Flutter Project
      run: |
        flutter create --org com.ammar --project-name kalam_smart web_project
        rm -rf web_project/lib/main.dart
        cp lib/main.dart web_project/lib/
        cp pubspec.yaml web_project/ || true

    # 5. جلب المكتبات وبناء الـ APK من داخل المجلد النظيف
    - name: Build Android APK
      run: |
        cd web_project
        flutter pub get
        flutter build apk --debug

    # 6. استخراج ملف الـ APK النهائي بنجاح
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Flutter-Drawing-App
        path: web_project/build/app/outputs/flutter-apk/app-debug.apk
