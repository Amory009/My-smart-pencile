name: Build Flutter Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الملفات الأساسية من مستودعك
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. تثبيت الجافا المتوافقة والمستقرة لبناء الأندرويد
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. تثبيت بيئة فلاتر المستقرة تماماً
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    # 4. بناء هيكل أندرويد متوافق ومستقر للسيرفرات السحابية
    - name: Auto-create Flutter project structures
      run: |
        flutter create --org com.ammar --project-name my_drawing_app temp_project
        rm -rf temp_project/lib/main.dart
        cp lib/main.dart temp_project/lib/
        cp pubspec.yaml temp_project/
        mv temp_project/* ./ || true
        mv temp_project/.[!.]* ./ || true

    # 5. تنظيف وتحديث الحزم والمكتبات بالكامل
    - name: Install dependencies
      run: |
        flutter pub get
        flutter clean

    # 6. بناء التطبيق مع تخطي أي تعارضات في ملفات أندرويد الهيكلية
    - name: Build APK
      run: flutter build apk --debug --subprojects-of-plugins

    # 7. استخراج وحفظ ملف الـ APK النهائي لمشاركته مع أي هاتف آخر
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Flutter-Drawing-App
        path: build/app/outputs/flutter-apk/app-debug.apk
