name: Build Flutter Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الملفات من مستودعك
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. تثبيت الجافا الأساسية للأندرويد
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. تثبيت بيئة فلاتر الكاملة
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    # 4. توليد هيكل أندرويد تلقائياً وبشكل سليم
    - name: Auto-create Flutter project structures
      run: |
        flutter create --org com.ammar --project-name my_drawing_app temp_project
        rm -rf temp_project/lib/main.dart
        cp lib/main.dart temp_project/lib/
        cp pubspec.yaml temp_project/
        mv temp_project/* ./ || true
        mv temp_project/.[!.]* ./ || true

    # 5. تحميل الحزم والمكتبات
    - name: Install dependencies
      run: flutter pub get

    # 6. بناء تطبيق أندرويد شامل لكافة أنواع المعالجات والأجهزة الأخرى
    - name: Build الشامل APK
      run: flutter build apk --debug --target-platform android-arm,android-arm64,android-x64

    # 7. استخراج الملف النهائي الجاهز للمشاركة والتثبيت
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Flutter-Drawing-App
        path: build/app/outputs/flutter-apk/app-debug.apk